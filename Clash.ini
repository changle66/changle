[custom]

; ====== Ruleset ======

; AI
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=AI,https://raw.githubusercontent.com/changle66/changle/refs/heads/main/cici.list

; Telegram（别放到 AI 里）
ruleset=Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml

; WhatsApp
ruleset=WhatsApp,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Whatsapp/Whatsapp.yaml

; Steam
ruleset=Steam,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml

; GitHub
ruleset=GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml

; 中国：用 GeoIP CN 代替 China 规则集
ruleset=GeoIpCN,[]GEOIP,CN

; FINAL
ruleset=兜底规则,[]FINAL


; ====== Proxy Groups ======

; 节点池：东亚（保留）
custom_proxy_group=东亚节点`url-test`(台|TW|Taiwan|日|JP|Japan|韩|KR|Korea|SG|Singapore|马来西亚|MY|Malaysia)`http://connectivitycheck.platform.hicloud.com/generate_204`300,50

; AI：默认走代理，DIRECT 放后面做备选
custom_proxy_group=AI`select`[]东亚节点`[]DIRECT`.*

; Telegram / WhatsApp / Steam / GitHub：默认走代理
custom_proxy_group=Telegram`select`[]东亚节点`[]DIRECT`.*
custom_proxy_group=WhatsApp`select`[]东亚节点`[]DIRECT`.*
custom_proxy_group=Steam`select`[]东亚节点`[]DIRECT`.*
custom_proxy_group=GitHub`select`[]东亚节点`[]DIRECT`.*

; GeoIP CN：命中中国 IP 一律直连（建议只给 DIRECT，避免误切）
custom_proxy_group=GeoIpCN`select`[]DIRECT

; 兜底：国外默认走代理
custom_proxy_group=兜底规则`select`[]东亚节点`[]DIRECT`[]REJECT`.*
