[custom]

; ======================
; Ruleset（匹配逻辑：由上至下）
; ======================

; 1. 【局域网直连】
ruleset=直连,[]GEOIP,LAN

; 2. 【高优先级业务规则】
; 微信优先处理，确保社交软件极速连接
ruleset=WeChat,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/WeChat/WeChat.yaml

; AI 服务（必须走代理）
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=AI,https://raw.githubusercontent.com/changle66/changle/refs/heads/main/cici.list

; GitHub（开发必备）
ruleset=GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml

; WhatsApp
ruleset=WhatsApp,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Whatsapp/Whatsapp.yaml

; 3. 【中国直连规则】
; 放在 Steam 之前，SteamCN 会被这里覆盖
ruleset=直连,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China_Classical.yaml

; 4. 【Steam 规则】
; SteamCN 已被上面 China 规则覆盖，这里只处理国际部分
ruleset=Steam,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml

; 5. 【国内 IP 判定】
ruleset=直连,[]GEOIP,CN

; 6. 【最终兜底】
ruleset=兜底规则,[]FINAL


; ======================
; Proxy Groups（策略组）
; ======================

; —— 总控：手动切换 ——
custom_proxy_group=节点选择`select`[]自动选择`[]香港节点`[]台湾节点`[]DIRECT

; —— 自动选择：基于延迟测速 —— 
custom_proxy_group=自动选择`url-test`[]香港节点`[]台湾节点`http://www.gstatic.com/generate_204`300,50

; —— 业务分流策略 ——
custom_proxy_group=GitHub`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]DIRECT
custom_proxy_group=WhatsApp`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]DIRECT
custom_proxy_group=AI`select`[]节点选择`[]自动选择`[]台湾节点`[]香港节点`[]DIRECT
custom_proxy_group=Steam`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]DIRECT
custom_proxy_group=WeChat`select`[]DIRECT`[]节点选择`[]自动选择

; —— 区域节点池（自动测速）——
custom_proxy_group=香港节点`url-test`(港|HK|Hong Kong|HongKong)`http://www.gstatic.com/generate_204`300,50
custom_proxy_group=台湾节点`url-test`(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,50

; —— 辅助策略 ——
custom_proxy_group=直连`select`[]DIRECT
custom_proxy_group=兜底规则`select`[]节点选择`[]自动选择`[]DIRECT
