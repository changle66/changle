[custom]

; ======================
; Ruleset（匹配逻辑：由上至下）
; ======================

; 1. 【高优先级直连】
ruleset=直连,[]GEOIP,LAN
ruleset=直连,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China_Classical.yaml

; 2. 【特定业务规则】（必须放在 ChinaIPs 之前，防止部分代理业务因 CDN 分流被判定为国内 IP）
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=AI,https://raw.githubusercontent.com/changle66/changle/refs/heads/main/cici.list

ruleset=WhatsApp,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Whatsapp/Whatsapp.yaml

; Steam 建议：SteamCN 放在前面兜住直连，Steam 放在后面处理商店和社区
ruleset=直连,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.yaml
ruleset=Steam,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml

; 3. 【国内 IP 判定】
ruleset=直连,[]GEOIP,CN

; 4. 【最终兜底】
ruleset=兜底规则,[]FINAL

; Proxy Groups
; ======================
; —— 总控：手动切换 ——
custom_proxy_group=节点选择`select`[]自动选择`[]香港节点`[]台湾节点`[]DIRECT`.*

; —— 自动选择：包含所有节点 —— 
custom_proxy_group=自动选择`url-test`[]香港节点`[]台湾节点`.*`http://connectivitycheck.platform.hicloud.com/generate_204`300,50

; —— 业务分流 ——
custom_proxy_group=AI`select`[]节点选择`[]自动选择`[]台湾节点`[]DIRECT`.*
custom_proxy_group=WhatsApp`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]DIRECT`.*
custom_proxy_group=Steam`select`[]节点选择`[]自动选择`[]DIRECT`.*

; —— 区域节点池 ——
custom_proxy_group=香港节点`url-test`(港|HK|Hong Kong|HongKong)`http://connectivitycheck.platform.hicloud.com/generate_204`300,50
custom_proxy_group=台湾节点`url-test`(台|TW|Taiwan)`http://connectivitycheck.platform.hicloud.com/generate_204`300,50

; —— 辅助策略 ——
custom_proxy_group=直连`select`[]DIRECT
custom_proxy_group=兜底规则`select`[]节点选择`[]DIRECT`[]REJECT`.*
