; ==================================================
; Proxy Groups（图标 + 排序优化版）
; 格式：组名`类型`节点/策略`测速URL`间隔,容差`图标URL
; ==================================================

; --- 1. 节点选择（总控，第一顺位） ---
custom_proxy_group=节点选择`select`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*`http://cp.cloudflare.com/generate_204`300,50`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png

