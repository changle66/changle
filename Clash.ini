[custom]

; ======================
; Ruleset（从上到下匹配）
; ======================

; --- 直连优先 ---
ruleset=直连,GEOIP,LAN
ruleset=直连,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China_Domain.yaml

; --- 业务分流 ---
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=AI,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=AI,https://raw.githubusercontent.com/changle66/changle/refs/heads/main/cici.list

ruleset=Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=WhatsApp,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Whatsapp/Whatsapp.yaml
ruleset=GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml

ruleset=SteamCN,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.yaml
ruleset=Steam,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml

; --- 兜底策略 ---
ruleset=直连,GEOIP,CN
ruleset=兜底规则,FINAL


; ======================
; Proxy Groups（策略组）
; ======================

; —— 总控 ——
custom_proxy_group=节点选择`select`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*

; —— 自动选择 (华为测速地址，国内连通性好) —— 
custom_proxy_group=自动选择`url-test`[]香港节点`[]台湾节点`[]新加坡节点`http://connectivitycheck.platform.hicloud.com/generate_204`300,600,50

; —— 地区节点池 ——
custom_proxy_group=香港节点`url-test`(港|HK|Hong Kong|HongKong)`http://connectivitycheck.platform.hicloud.com/generate_204`300,600,50
custom_proxy_group=台湾节点`url-test`(台|TW|Taiwan)`http://connectivitycheck.platform.hicloud.com/generate_204`300,600,50
custom_proxy_group=新加坡节点`url-test`(新加坡|狮城|SG|Singapore)`http://connectivitycheck.platform.hicloud.com/generate_204`300,600,50

; —— 业务细分 ——
custom_proxy_group=AI`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*
custom_proxy_group=Telegram`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*
custom_proxy_group=WhatsApp`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*
custom_proxy_group=GitHub`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*

custom_proxy_group=SteamCN`select`[]DIRECT`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`.*
custom_proxy_group=Steam`select`[]节点选择`[]自动选择`[]香港节点`[]台湾节点`[]新加坡节点`[]DIRECT`.*

custom_proxy_group=直连`select`[]DIRECT
custom_proxy_group=兜底规则`select`[]节点选择`[]DIRECT`[]REJECT`.*
