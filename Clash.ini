custom_proxy_group=自动选择`url-test`[]香港节点`[]台湾节点`[]新加坡节点`.*`http://cp.cloudflare.com/generate_204`300,50`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Urltest.png

